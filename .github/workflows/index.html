<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Sorting Visualizer</title>

<style>
body{
    margin:0;
    padding:0;
    background:#121212;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin-top:20px;
}

.controls{
    margin:20px;
}

button{
    padding:10px 20px;
    margin:8px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
    background:#00adb5;
    color:white;
}

button:hover{
    background:#008891;
}

#array-container{
    width:90%;
    height:400px;
    margin:auto;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    border:2px solid white;
    padding:10px;
}

.bar{
    width:20px;
    margin:0 2px;
    background:#00adb5;
}
</style>
</head>

<body>

<h1>DSA Sorting Visualizer</h1>

<div class="controls">
    <button onclick="generateArray()">Generate Array</button>
    <button onclick="bubbleSort()">Bubble Sort</button>
    <button onclick="selectionSort()">Selection Sort</button>
    <button onclick="insertionSort()">Insertion Sort</button>
</div>

<div id="array-container"></div>

<script>

let array = [];

generateArray();

function generateArray() {

    array = [];

    const container =
    document.getElementById("array-container");

    container.innerHTML = "";

    for(let i=0;i<30;i++){

        let value =
        Math.floor(Math.random()*300)+20;

        array.push(value);

        const bar =
        document.createElement("div");

        bar.classList.add("bar");

        bar.style.height = value + "px";

        container.appendChild(bar);
    }
}

function sleep(ms){
    return new Promise(resolve =>
    setTimeout(resolve,ms));
}

async function bubbleSort(){

    const bars =
    document.getElementsByClassName("bar");

    for(let i=0;i<array.length;i++){

        for(let j=0;
            j<array.length-i-1;
            j++){

            bars[j].style.background="red";
            bars[j+1].style.background="red";

            await sleep(50);

            if(array[j] > array[j+1]){

                let temp=array[j];
                array[j]=array[j+1];
                array[j+1]=temp;

                bars[j].style.height=
                array[j]+"px";

                bars[j+1].style.height=
                array[j+1]+"px";
            }

            bars[j].style.background="#00adb5";
            bars[j+1].style.background="#00adb5";
        }

        bars[array.length-i-1]
        .style.background="green";
    }
}

async function selectionSort(){

    const bars =
    document.getElementsByClassName("bar");

    for(let i=0;i<array.length;i++){

        let min=i;

        bars[min].style.background="red";

        for(let j=i+1;
            j<array.length;
            j++){

            bars[j].style.background="yellow";

            await sleep(50);

            if(array[j] < array[min]){

                bars[min].style.background=
                "#00adb5";

                min=j;

                bars[min].style.background=
                "red";
            }
            else{
                bars[j].style.background=
                "#00adb5";
            }
        }

        let temp=array[i];
        array[i]=array[min];
        array[min]=temp;

        bars[i].style.height=
        array[i]+"px";

        bars[min].style.height=
        array[min]+"px";

        bars[i].style.background="green";
    }
}

async function insertionSort(){

    const bars =
    document.getElementsByClassName("bar");

    for(let i=1;i<array.length;i++){

        let key=array[i];
        let j=i-1;

        bars[i].style.background="red";

        await sleep(50);

        while(j>=0 &&
              array[j] > key){

            array[j+1]=array[j];

            bars[j+1].style.height=
            array[j]+"px";

            j--;

            await sleep(50);
        }

        array[j+1]=key;

        bars[j+1].style.height=
        key+"px";

        bars[i].style.background=
        "#00adb5";
    }
}

</script>

</body>
</html>
